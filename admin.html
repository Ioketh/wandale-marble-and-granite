<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - WANDALE Marble</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="admin-body">
    <div class="admin-container">
        <!-- Login Section -->
        <div id="login-section" class="login-section">
            <div class="login-box">
                <h2>Admin Login</h2>
                <form id="loginForm">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" required>
                    </div>
                    <button type="submit" class="login-btn">Login</button>
                </form>
            </div>
        </div>

        <!-- Admin Dashboard -->
        <div id="dashboard" class="dashboard" style="display: none;">
            <div class="dashboard-header">
                <h1>Admin Dashboard</h1>
                <button id="logoutBtn" class="logout-btn">Logout</button>
            </div>
            
            <!-- Tab Navigation -->
            <div class="admin-tabs">
                <button class="tab-btn active" data-tab="products">Products</button>
                <button class="tab-btn" data-tab="projects">Projects</button>
            </div>
            
            <!-- Products Tab -->
            <div id="products-tab" class="tab-content active">
                <h2>Manage Products (Available Marble/Granite)</h2>
                
                <!-- Upload Product Form -->
                <div class="upload-section">
                    <h3>Add New Product</h3>
                    <form id="productForm">
                        <div class="form-group">
                            <label for="productName">Product Name</label>
                            <input type="text" id="productName" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="productCategory">Category</label>
                            <select id="productCategory" required>
                                <option value="marble">Marble</option>
                                <option value="granite">Granite</option>
                                <option value="quartzite">Quartzite</option>
                                <option value="onyx">Onyx</option>
                            </select>
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="productPrice">Price per meter (UGX)</label>
                                <input type="number" id="productPrice" required>
                            </div>
                            
                            <div class="form-group">
                                <label for="productUnit">Unit</label>
                                <select id="productUnit">
                                    <option value="m²">Per Square Meter</option>
                                    <option value="m">Per Meter</option>
                                    <option value="sqft">Per Square Foot</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label for="productDescription">Description</label>
                            <textarea id="productDescription" rows="3" required></textarea>
                        </div>
                        
                        <div class="form-group">
                            <label for="productFeatures">Features (comma separated)</label>
                            <input type="text" id="productFeatures" placeholder="e.g., Durable, Stain Resistant, Polished Finish">
                        </div>
                        
                        <div class="form-group">
                            <label for="productImage">Product Image</label>
                            <input type="file" id="productImage" accept="image/*" required>
                        </div>
                        
                        <button type="submit" class="upload-btn">Add Product</button>
                    </form>
                </div>
                
                <!-- Products List -->
                <div class="management-section">
                    <h3>Available Products</h3>
                    <div id="products-list" class="items-grid"></div>
                </div>
            </div>
            
            <!-- Projects Tab -->
            <div id="projects-tab" class="tab-content">
                <h2>Manage Projects (Daily Work)</h2>
                
                <!-- Upload Project Form -->
                <div class="upload-section">
                    <h3>Add New Project</h3>
                    <form id="projectForm">
                        <div class="form-group">
                            <label for="projectTitle">Project Title</label>
                            <input type="text" id="projectTitle" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="projectCategory">Category</label>
                            <select id="projectCategory" required>
                                <option value="kitchen">Kitchen</option>
                                <option value="tombs">Tombs</option>
                                <option value="stairs">Stairs</option>
                                <option value="flooring">Flooring</option>
                                <option value="custom">Custom</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label for="projectDescription">Description</label>
                            <textarea id="projectDescription" rows="3" required></textarea>
                        </div>
                        
                        <div class="form-group">
                            <label for="projectMediaType">Media Type</label>
                            <select id="projectMediaType">
                                <option value="image">Image</option>
                                <option value="video">Video (YouTube/Vimeo)</option>
                            </select>
                        </div>
                        
                        <div class="form-group" id="projectImageGroup">
                            <label for="projectImage">Image</label>
                            <input type="file" id="projectImage" accept="image/*">
                        </div>
                        
                        <div class="form-group" id="projectVideoGroup" style="display: none;">
                            <label for="projectVideoUrl">Video URL</label>
                            <input type="url" id="projectVideoUrl" placeholder="https://youtube.com/watch?v=...">
                        </div>
                        
                        <button type="submit" class="upload-btn">Add Project</button>
                    </form>
                </div>
                
                <!-- Projects List -->
                <div class="management-section">
                    <h3>Project Gallery</h3>
                    <div id="projects-list" class="items-grid"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/admin.js"></script>
</body>
</html>
